<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Campus Hub AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --bg-base: #0a0a0a;
            --bg-surface: #171717;
            --bg-input: #262626;
            --text-primary: #f5f5f5;
            --text-secondary: #a3a3a3;
            --accent: #e4e4e7;
            --user-msg: #2d2d2d;
            --border: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* Top Bar */
        header {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: var(--bg-base);
            z-index: 10;
        }

        .brand { font-weight: 600; font-size: 16px; letter-spacing: 0.5px; }
        .status { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
        .dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; }

        /* Chat Area */
        main {
            flex: 1;
            width: 100%;
            max-width: 800px;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        /* Hide Scrollbar */
        main::-webkit-scrollbar { display: none; }
        main { -ms-overflow-style: none; scrollbar-width: none; }

        .message {
            max-width: 85%;
            line-height: 1.6;
            font-size: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .message.user { align-self: flex-end; align-items: flex-end; }
        .message.bot { align-self: flex-start; }

        .bubble {
            padding: 14px 18px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .user .bubble {
            background: var(--user-msg);
            color: var(--text-primary);
            border-bottom-right-radius: 4px;
        }

        .bot .bubble {
            background: transparent;
            color: var(--text-primary);
            padding: 0;
        }

        /* Action Cards / Widgets generated by Bot */
        .widget-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-top: 8px;
            width: 100%;
            max-width: 350px;
        }

        .widget-card h4 { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--text-primary); }
        .widget-card p { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; }
        .widget-btn {
            display: inline-block;
            background: var(--accent);
            color: #000;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        .widget-btn:hover { opacity: 0.8; }

        /* Input Area */
        .input-container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            background: linear-gradient(to top, var(--bg-base) 60%, transparent);
        }

        .input-box {
            display: flex;
            align-items: flex-end;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 8px 16px;
            transition: border-color 0.2s;
            position: relative;
        }

        .input-box:focus-within { border-color: #555; }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
            padding: 10px 0;
            max-height: 120px;
            resize: none;
            outline: none;
            line-height: 1.5;
        }

        textarea::placeholder { color: #666; }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            padding: 10px;
            cursor: pointer;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover { color: var(--text-primary); }
        
        /* File Attachment Indicator */
        #fileIndicator {
            display: none;
            position: absolute;
            top: -40px;
            left: 10px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: var(--text-secondary);
            align-items: center;
            gap: 8px;
        }
        #fileIndicator i.fa-times { cursor: pointer; color: #ef4444; }

    </style>
</head>
<body>

    <header>
        <div class="brand">CampusHub</div>
        <div class="status"><div class="dot"></div> Agent Online</div>
    </header>

    <main id="chatWindow">
        <div class="message bot">
            <div class="bubble">
                Hey. I'm your campus agent. Ask me for the mess menu, TumTum tracking, or upload notes to share with the batch. What's up?
            </div>
        </div>
    </main>

    <div class="input-container">
        <div class="input-box">
            <div id="fileIndicator">
                <i class="fa-solid fa-file-lines"></i> <span id="fileName">file.pdf</span> 
                <i class="fa-solid fa-times" onclick="removeFile()"></i>
            </div>
            
            <input type="file" id="fileInput" style="display: none;" onchange="handleFileSelect(event)">
            <button class="icon-btn" onclick="document.getElementById('fileInput').click()" title="Upload File">
                <i class="fa-solid fa-paperclip"></i>
            </button>
            
            <textarea id="userInput" rows="1" placeholder="Ask or upload something..." oninput="autoResize(this)" onkeydown="handleEnter(event)"></textarea>
            
            <button class="icon-btn" onclick="sendMessage()" style="color: var(--text-primary);">
                <i class="fa-solid fa-arrow-up"></i>
            </button>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const userInput = document.getElementById('userInput');
        const fileInput = document.getElementById('fileInput');
        const fileIndicator = document.getElementById('fileIndicator');
        const fileNameDisplay = document.getElementById('fileName');
        
        let attachedFile = null;

        // Auto-resize textarea
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        // Handle File Selection
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                attachedFile = file;
                fileNameDisplay.textContent = file.name;
                fileIndicator.style.display = 'flex';
                userInput.focus();
            }
        }

        function removeFile() {
            attachedFile = null;
            fileInput.value = '';
            fileIndicator.style.display = 'none';
        }

        // Send Message Logic
        function handleEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function sendMessage() {
            const text = userInput.value.trim();
            if (!text && !attachedFile) return;

            // Render User Message
            let userContent = text;
            if (attachedFile) {
                userContent = `[Attached: ${attachedFile.name}]<br>` + text;
            }
            
            appendMessage('user', `<div class="bubble">${userContent}</div>`);
            
            userInput.value = '';
            userInput.style.height = 'auto';
            
            // Simulate Agent Processing
            const query = text.toLowerCase();
            const hasFile = attachedFile !== null;
            removeFile(); // clear attachment state after sending

            setTimeout(() => {
                generateAgentResponse(query, hasFile);
            }, 600);
        }

        function appendMessage(sender, htmlContent) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            msgDiv.innerHTML = htmlContent;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // Mock Agent Brain - Replace this with an API call to your backend later
        function generateAgentResponse(query, hasFile) {
            let responseHtml = '';

            if (hasFile) {
                responseHtml = `
                    <div class="bubble">Got it. I've processed the file and added it to the decentralized campus vault. Thanks for contributing!</div>
                `;
            } 
            else if (query.includes('menu') || query.includes('mess')) {
                responseHtml = `
                    <div class="bubble">Here is the menu for tonight:</div>
                    <div class="widget-card">
                        <h4>Dinner - H12</h4>
                        <p>Dal Makhani, Paneer Butter Masala, Roti, Rice, Gulab Jamun.</p>
                        <a href="#" class="widget-btn">View Weekly Menu</a>
                    </div>
                `;
            } 
            else if (query.includes('bus') || query.includes('tumtum')) {
                responseHtml = `
                    <div class="bubble">The next TumTum from Main Gate to Academic Area leaves in 4 minutes.</div>
                    <div class="widget-card">
                        <h4>Live Tracking</h4>
                        <p>3 buses currently active on the Main route.</p>
                        <a href="#" class="widget-btn">Open Map</a>
                    </div>
                `;
            } 
            else if (query.includes('event')) {
                responseHtml = `
                    <div class="bubble">Upcoming major events:</div>
                    <div class="widget-card">
                        <h4>PG Reunion 2026</h4>
                        <p>Feb 27 - Feb 28. Department networking and campus visits.</p>
                        <a href="#" class="widget-btn">Register Here</a>
                    </div>
                `;
            }
            else {
                responseHtml = `
                    <div class="bubble">I can help with that. Are you looking for a specific link or should I search the campus directory for you?</div>
                `;
            }

            appendMessage('bot', responseHtml);
        }
    </script>
</body>
</html>
